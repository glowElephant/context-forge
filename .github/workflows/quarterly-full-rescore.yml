name: quarterly-full-rescore

on:
  schedule:
    # 분기 첫 달(1, 4, 7, 10) 1일 03:30 UTC
    - cron: "30 3 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rescore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Full catalog rescore + borderline list refresh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/automation.py rescore
      - name: Open PR if anything changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "no changes"
            exit 0
          fi
          quarter="$(date +%Y)-Q$(( ($(date +%-m) - 1) / 3 + 1 ))"
          branch="bot/quarterly-rescore-${quarter}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add catalog _status
          git commit -m "chore(rescore): 분기 전체 재채점 (${quarter})"
          git push -u origin "$branch"
          gh pr create \
            --title "chore(rescore): 분기 전체 재채점 ${quarter}" \
            --body "자동 생성: 전체 카탈로그 Pop+Act 재채점 + borderline 리스트 갱신. 강등(active→archived)된 항목은 \`_status/history.jsonl\` 참고." \
            --base main --head "$branch"
