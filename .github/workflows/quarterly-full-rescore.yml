name: quarterly-full-rescore

on:
  schedule:
    # 분기 첫 달(1, 4, 7, 10) 1일 03:30 UTC
    - cron: "30 3 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rescore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Full catalog rescore + borderline list refresh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/automation.py rescore
      - name: Validate catalog after rescore
        run: bash scripts/validate-catalog.sh
      - name: Open PR + auto-merge if no archive flips
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "no changes"
            exit 0
          fi
          quarter="$(date +%Y)-Q$(( ($(date +%-m) - 1) / 3 + 1 ))"
          branch="bot/quarterly-rescore-${quarter}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add catalog _status
          git commit -m "chore(rescore): 분기 전체 재채점 (${quarter})"
          git push -u origin "$branch"
          pr_url=$(gh pr create \
            --title "chore(rescore): 분기 전체 재채점 ${quarter}" \
            --body "자동 생성: 전체 카탈로그 Pop+Act 재채점 + borderline 리스트 갱신. 강등(active→archived)된 항목은 \`_status/history.jsonl\` 참고." \
            --base main --head "$branch")
          if git diff origin/main..HEAD -- 'catalog/*/*.md' | grep -qE '^-status:'; then
            echo "::notice::status flipped (archive/unarchive) — leaving PR for human review: $pr_url"
          else
            echo "::notice::score-only update — auto-merging $pr_url"
            gh pr merge "$pr_url" --squash --delete-branch
          fi
