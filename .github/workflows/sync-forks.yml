name: Sync Forks

on:
  schedule:
    # Sunday 00:00 UTC = Monday 09:00 KST
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-forks
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout context-forge
        uses: actions/checkout@v4

      - name: Verify token is configured
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::FORK_SYNC_TOKEN secret is not set. See docs/fork-sync-setup.md"
            exit 1
          fi
          gh auth status

      - name: Sync all forks from upstream
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: bash scripts/sync-forks.sh

      - name: Commit log + index updates
        run: |
          if git diff --quiet sources/; then
            echo "No changes to commit (everything was already up to date)."
            exit 0
          fi
          git config user.name  "fork-sync-bot"
          git config user.email "fork-sync-bot@users.noreply.github.com"
          git add sources/sync-log.md sources/index.json
          git commit -m "chore(sync): weekly fork sync $(date -u +%Y-%m-%d)"
          git push
