name: link-check

on:
  pull_request:
    paths:
      - "catalog/**.md"
  schedule:
    # Weekly Monday 04:00 UTC
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-source-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract source/upstream URLs from catalog frontmatter
        id: urls
        run: |
          set -euo pipefail
          mkdir -p /tmp/lc
          grep -hE '^(source|upstream):' catalog/*/*.md \
            | sed -E 's/^(source|upstream):[ ]*//' \
            | sort -u > /tmp/lc/urls.txt
          echo "Found $(wc -l </tmp/lc/urls.txt) unique URLs"
      - name: HEAD-check each URL
        run: |
          set -uo pipefail
          fail=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            code=$(curl -s -o /dev/null -L -w "%{http_code}" --max-time 20 -A "context-forge-link-check" "$url" || echo "000")
            if [[ "$code" =~ ^(2|3) ]]; then
              echo "OK   $code  $url"
            else
              echo "FAIL $code  $url"
              fail=$((fail+1))
            fi
          done < /tmp/lc/urls.txt
          if [ "$fail" -gt 0 ]; then
            echo "::error::$fail link(s) failed"
            exit 1
          fi
