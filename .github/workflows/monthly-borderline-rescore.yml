name: monthly-borderline-rescore

on:
  schedule:
    # 매달 1일 03:00 UTC
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rescore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rescore borderline catalog entries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/automation.py rescore --borderline-only
      - name: Validate catalog after rescore
        run: bash scripts/validate-catalog.sh
      - name: Open PR + auto-merge if no archive flips
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "no changes"
            exit 0
          fi
          branch="bot/monthly-rescore-$(date +%Y-%m)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add catalog _status
          git commit -m "chore(rescore): 월간 borderline 재채점 ($(date +%Y-%m))"
          git push -u origin "$branch"
          pr_url=$(gh pr create \
            --title "chore(rescore): 월간 borderline 재채점 $(date +%Y-%m)" \
            --body "자동 생성: borderline 리스트 재채점 결과. \`_status/history.jsonl\` 의 새 항목과 frontmatter score 갱신을 검토해주세요." \
            --base main --head "$branch")
          # archive/unarchive 발생 시 (status 라인이 변경된 경우) 사람 검토
          if git diff origin/main..HEAD -- 'catalog/*/*.md' | grep -qE '^-status:'; then
            echo "::notice::status flipped (archive/unarchive) — leaving PR for human review: $pr_url"
          else
            echo "::notice::score-only update — auto-merging $pr_url"
            gh pr merge "$pr_url" --squash --delete-branch
          fi
